# ═══════════════════════════════════════════════════════════════════════════
# HEADY DISTILLER CONFIGURATION
# Reverse-engineering agent traces into optimized execution recipes
# ═══════════════════════════════════════════════════════════════════════════

distiller:
  # Trace storage
  trace_dir: "logs/traces/"
  max_traces: 10000
  max_trace_entries: 50000

  # ─── FILTERING ─────────────────────────────────────────────────────────
  filtering:
    # Success filtering (SWE-Gym RFT pattern)
    min_success_rate: 0.8

    # Confidence filtering (WEBRL pattern)
    # [low_percentile, high_percentile] — exclude trivial and flailing traces
    confidence_window: [0.1, 0.9]

    # Trajectory-to-tips extraction (March 2026 paper)
    tip_extraction: true
    max_tips: 200

  # ─── OPTIMIZATION ──────────────────────────────────────────────────────
  optimization:
    # Method: gepa | miprov2 | textgrad
    # GEPA: Pareto frontier + LLM reflection (ICLR 2026, +6% over RL at 35× fewer rollouts)
    # MIPROv2: Bayesian search over instruction/demo combos
    # TextGrad: Automatic differentiation through text (Nature 2024, GPT-3.5 78%→92% on BBH)
    method: "gepa"
    max_iterations: 150
    reflection_model: "claude-sonnet-4"
    batch_size: 10

  # ─── SYNTHESIS ─────────────────────────────────────────────────────────
  synthesis:
    # Where distilled SKILL.md files are written
    output_dir: ".claude/skills/distilled/"
    format: "skill-md"
    embedding_index: true

  # ─── ROUTING ───────────────────────────────────────────────────────────
  routing:
    # Semantic routing (Aurelio semantic-router pattern, ~10ms, 92-96% precision)
    method: "semantic"
    similarity_threshold: 0.82
    fibonacci_hash: true
    multi_signal: true

  # ─── COMPRESSION ───────────────────────────────────────────────────────
  compression:
    # LLMLingua-2-style token compression
    enabled: true
    target_ratio: 0.5  # keep 50% of tokens
    u_curve_weight: 0.2  # weight for position-based importance (lost-in-the-middle)

  # ─── COLAB GPU OFFLOAD ──────────────────────────────────────────────────
  colab:
    enabled: true
    gateway_url: "${COLAB_GATEWAY_URL:-http://colab-gateway:3366}"
    # Pool assignments for distill tasks
    filter_pool: "cold"        # GPU filtering on cold runtime (experiments)
    optimize_pool: "cold"      # Prompt optimization on cold runtime
    embed_pool: "hot"          # Embedding generation on hot runtime (real-time)
    synthesize_pool: "cold"    # Skill synthesis on cold runtime
    # Auto-offload: switch from CPU to GPU when trace count exceeds threshold
    auto_offload_threshold: 100
    # Feedback loop: push optimized prompts back to cold runtime for validation
    feedback_loop: true
    # API endpoints mounted at /distill/* on the Colab gateway
    routes:
      status: "/distill/status"
      traces: "/distill/traces"
      optimize: "/distill/optimize"
      pipeline: "/distill/pipeline"

  # ─── CACHING ───────────────────────────────────────────────────────────
  caching:
    # Multi-tier cache strategy
    exact_match: true         # guaranteed identical responses for replay
    semantic_cache: true      # handle query variations
    prefix_cache: true        # provider-level system prompt caching (90% savings)
    semantic_threshold: 0.85  # similarity threshold for semantic cache hits
