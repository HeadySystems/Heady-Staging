name: heady-local

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL:-postgres://heady:heady@postgres:5432/heady}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - heady-net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    heady-manager:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heady}
      POSTGRES_USER: ${POSTGRES_USER:-heady}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heady}
    volumes:
      - heady-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heady} -d ${POSTGRES_DB:-heady}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - heady-net

  redis:
    image: redis:7-alpine
    init: true
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - heady-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - heady-net

  heady-manager:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: 3300
      HEADY_API_KEY: ${HEADY_API_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      USE_HEADY_MANAGER: ${USE_HEADY_MANAGER:-true}
      HEADY_TARGET: ${HEADY_TARGET:-CloudOnly}
    ports:
      - "${HEADY_MANAGER_HOST_PORT:-3300}:3300"
    volumes:
      - heady-data:/app/data
      - heady-logs:/app/logs
      - heady-cache:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3300/api/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  heady-buddy:
    build:
      context: ../services/heady-buddy
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3351
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${HEADY_BUDDY_HOST_PORT:-3351}:3351"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3351/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - heady-net

  domain-router:
    <<: *service-defaults
    build:
      context: ../services/domain-router
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/domain-router"
        SERVICE_NAME: "domain-router"
    command: ["tsx", "./services/domain-router/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4301
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4301"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4301/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  budget-tracker:
    <<: *service-defaults
    build:
      context: ../services/budget-tracker
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/budget-tracker"
        SERVICE_NAME: "budget-tracker"
    command: ["tsx", "./services/budget-tracker/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4303
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4303"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4303/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  heady-memory:
    <<: *service-defaults
    build:
      context: ../services/heady-memory
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/heady-memory"
        SERVICE_NAME: "heady-memory"
    command: ["tsx", "./services/heady-memory/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4304
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4304"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4304/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  heady-health:
    <<: *service-defaults
    build:
      context: ../services/heady-health
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/heady-health"
        SERVICE_NAME: "heady-health"
    command: ["tsx", "./services/heady-health/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4305
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4305"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4305/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  heady-conductor:
    <<: *service-defaults
    build:
      context: ../services/heady-conductor
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/heady-conductor"
        SERVICE_NAME: "heady-conductor"
    command: ["tsx", "./services/heady-conductor/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4306
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4306"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4306/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  heady-brains:
    <<: *service-defaults
    build:
      context: ../services/heady-brains
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/heady-brains"
        SERVICE_NAME: "heady-brains"
    command: ["tsx", "./services/heady-brains/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4307
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4307"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4307/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  heady-soul:
    <<: *service-defaults
    build:
      context: ../services/heady-soul
      dockerfile: ../../Dockerfile.service
      additional_contexts:
        packages: ../packages
        workspace_meta: ../docker/workspace-meta
      args:
        SERVICE_FILTER: "@heady-ai/heady-soul"
        SERVICE_NAME: "heady-soul"
    command: ["tsx", "./services/heady-soul/src/index.ts"]
    environment:
      <<: *app-env
      PORT: 4308
      HEADY_MANAGER_URL: http://heady-manager:3300
    expose:
      - "4308"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4308/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  auth-session-server:
    build:
      context: ../services/auth-session-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4309
      NODE_ENV: production
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-gen-lang-client-0920560496}
    ports:
      - "${AUTH_SESSION_SERVER_HOST_PORT:-4309}:4309"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4309/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - heady-net

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["debug"]
    init: true
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@heady.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-heady_admin}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_HOST_PORT:-8080}:80"
    volumes:
      - heady-pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - heady-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: ["debug"]
    init: true
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "${REDIS_COMMANDER_HOST_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - heady-net

volumes:
  heady-postgres:
  heady-redis:
  heady-data:
  heady-pgadmin:
  heady-logs:
  heady-cache:

networks:
  heady-net:
    driver: bridge
