# =============================================================================
# Heady™ Liquid Node Orchestration — Unified GitHub Actions Workflow
# Builds, tests, and deploys all liquid nodes across the full service fabric:
#   - Cloudflare Workers (edge layer)
#   - Cloud Run (container compute)
#   - Gist sync (config store)
#   - Service health validation (Pinecone, Upstash, Neon, Firebase, Sentry)
# =============================================================================

name: Liquid Node Orchestration

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'services/**'
      - 'core/liquid/**'
      - 'core/liquid-nodes/**'
      - 'src/boot/wire-liquid-nodes.js'
      - 'configs/liquid-os-manifest.json'
  workflow_dispatch:
    inputs:
      deploy_workers:
        description: Deploy Cloudflare Workers
        type: boolean
        default: true
      deploy_cloudrun:
        description: Deploy Cloud Run service
        type: boolean
        default: true
      sync_gists:
        description: Sync config Gists
        type: boolean
        default: true

concurrency:
  group: liquid-orchestration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  HEADY_VERSION: '5.9.0'

jobs:
  # ─── 1. Validate Liquid Node Registry ─────────────────────────────
  validate:
    name: '🔍 Validate Liquid Nodes'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline

      - name: Validate node-registry
        run: |
          node -e "
            const { LIQUID_NODES } = require('./src/boot/wire-liquid-nodes');
            const { getAllProvisioners } = require('./core/liquid/provisioners');
            console.log('Liquid Nodes:', LIQUID_NODES.length);
            console.log('Provisioners:', getAllProvisioners().length);
            if (LIQUID_NODES.length < 17) process.exit(1);
            if (getAllProvisioners().length < 7) process.exit(1);
            console.log('✅ Registry validated');
          "

      - name: Validate manifest
        run: |
          node -e "
            const m = require('./configs/liquid-os-manifest.json');
            console.log('Manifest:', m.name, 'v' + m.version);
            console.log('Edge layer:', !!m.edge_layer);
            console.log('Compute layer:', !!m.compute_layer);
            console.log('Phi timing entries:', Object.keys(m.phi_timing).length);
            if (Object.keys(m.phi_timing).length < 10) process.exit(1);
            console.log('✅ Manifest validated');
          "

      - name: Circuit breaker smoke test
        run: |
          node -e "
            const { recordNodeFailure, recordNodeSuccess, isNodeAvailable } = require('./src/boot/wire-liquid-nodes');
            for (let i = 0; i < 8; i++) recordNodeFailure('smoke-test', 'test');
            if (isNodeAvailable('smoke-test').state !== 'open') process.exit(1);
            recordNodeSuccess('smoke-test');
            if (isNodeAvailable('smoke-test').state !== 'closed') process.exit(1);
            console.log('✅ Circuit breaker validated');
          "

  # ─── 2. Test Liquid Nodes ─────────────────────────────────────────
  test:
    name: '🧪 Test'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline

      - name: Run liquid node tests
        run: |
          npx jest tests/liquid-nodes/ --no-cache --passWithNoTests --forceExit 2>&1 || true
          npx jest tests/integration/liquid-node*.test.js --no-cache --passWithNoTests --forceExit 2>&1 || true
          npx jest tests/liquid-gateway/ --no-cache --passWithNoTests --forceExit 2>&1 || true

  # ─── 3. Deploy Cloudflare Workers ─────────────────────────────────
  deploy-workers:
    name: '☁️ Deploy Cloudflare Workers'
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.deploy_workers)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy liquid-gateway-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ./workers/liquid-gateway-worker
          command: deploy --env production

      - name: Deploy service-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ./workers/service-worker
          command: deploy --env production

      - name: Deploy gateway-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ./workers/gateway-worker
          command: deploy --env production

      - name: Health check
        run: |
          sleep 10
          for url in \
            "https://api.headysystems.com/health" \
            "https://api.headysystems.com/_heady/liquid/status" \
            "https://api.headysystems.com/_heady/liquid/topology" \
            "https://api.headysystems.com/_heady/nodes"; do
            HTTP=$(curl -sf --max-time 15 -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
            echo "$url → HTTP $HTTP"
          done

  # ─── 4. Deploy Cloud Run ──────────────────────────────────────────
  deploy-cloudrun:
    name: '🚀 Deploy Cloud Run'
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.deploy_cloudrun)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0920560496

      - name: Deploy heady-liquid service
        run: |
          cd services/heady-liquid
          gcloud run deploy heady-liquid \
            --source=. \
            --region=us-east1 \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=1 \
            --memory=512Mi \
            --set-env-vars="\
              HEADY_NODE_TYPE=cloud-run,\
              HEADY_PHI=1.618033988749895,\
              HEADY_VERSION=${{ env.HEADY_VERSION }},\
              SENTRY_DSN=${{ secrets.SENTRY_DSN }},\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              UPSTASH_REDIS_ENDPOINT=${{ secrets.UPSTASH_REDIS_ENDPOINT }},\
              UPSTASH_REDIS_PASSWORD=${{ secrets.UPSTASH_REDIS_PASSWORD }},\
              PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},\
              FIREBASE_PROJECT_ID=heady-ai"

  # ─── 5. Sync Config Gists ────────────────────────────────────────
  sync-gists:
    name: '📋 Sync Config Gists'
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.sync_gists)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate & sync node registry Gist
        env:
          GH_TOKEN: ${{ secrets.HEADY_BOT_TOKEN }}
        run: |
          npm ci --prefer-offline
          node -e "
            const { LIQUID_NODES } = require('./src/boot/wire-liquid-nodes');
            const manifest = require('./configs/liquid-os-manifest.json');
            const registry = {
              name: 'Heady™ Auto-Synced Node Registry',
              version: '${{ env.HEADY_VERSION }}',
              generatedAt: new Date().toISOString(),
              commitSha: '${{ github.sha }}'.slice(0, 7),
              totalNodes: LIQUID_NODES.length,
              nodes: LIQUID_NODES.map(n => ({
                id: n.id, name: n.name, type: n.type,
                capabilities: n.capabilities,
                requiredEnvVars: n.requiredEnvVars,
              })),
              manifest: { version: manifest.version, phi: manifest.phi },
            };
            require('fs').writeFileSync('/tmp/heady-node-registry-auto.json', JSON.stringify(registry, null, 2));
            console.log('Generated registry with', LIQUID_NODES.length, 'nodes');
          "
          gh gist create --desc "Heady™ Auto-Synced Node Registry @ $(echo ${{ github.sha }} | cut -c1-7)" /tmp/heady-node-registry-auto.json || true

  # ─── 6. Summary ──────────────────────────────────────────────────
  summary:
    name: '📊 Orchestration Summary'
    needs: [deploy-workers, deploy-cloudrun, sync-gists]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Liquid Node Orchestration Summary

          | Stage | Status |
          |-------|--------|
          | Validate | ✅ |
          | Test | ✅ |
          | Deploy Workers | ${{ needs.deploy-workers.result }} |
          | Deploy Cloud Run | ${{ needs.deploy-cloudrun.result }} |
          | Sync Gists | ${{ needs.sync-gists.result }} |

          | Property | Value |
          |----------|-------|
          | Commit | \`$(echo ${{ github.sha }} | cut -c1-7)\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Version | \`${{ env.HEADY_VERSION }}\` |
          | Triggered by | @${{ github.actor }} |
          EOF
