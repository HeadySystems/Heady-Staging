name: CI — Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        continue-on-error: true

      - name: Lint — ESLint
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            npx eslint src/ --ext .js,.mjs --max-warnings 50 --no-error-on-unmatched-pattern
          else
            echo "No ESLint config found — skipping"
          fi
        continue-on-error: true

      - name: Lint — Check for merge conflict markers
        run: |
          if grep -rn "<<<<<<< \|>>>>>>> \|=======" --include="*.js" --include="*.json" --include="*.html" --include="*.css" src/ public/ services/ 2>/dev/null; then
            echo "::error::Merge conflict markers found"
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Lint — Check for localhost references
        run: |
          FOUND=$(grep -rn "localhost" --include="*.js" --include="*.json" src/ services/ 2>/dev/null | grep -v node_modules | grep -v "// localhost" || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Localhost references found (should use env vars):"
            echo "$FOUND"
          fi

      - name: Lint — Validate JSON content files
        run: |
          find content/domains -name "*.json" -exec sh -c '
            for f; do
              python3 -c "import json; json.load(open(\"$f\"))" 2>/dev/null || echo "::error::Invalid JSON: $f"
            done
          ' _ {} +
        continue-on-error: true

      - name: Test — Core server startup
        run: |
          timeout 10 node -e "
            try {
              require('./src/core/content-sections.js');
              require('./src/core/content-loader.js');
              console.log('✅ Core modules load successfully');
            } catch(e) {
              console.error('❌ Module load failed:', e.message);
              process.exit(1);
            }
          " || true

      - name: Security — Check for hardcoded secrets
        run: |
          PATTERNS="(sk_live_|sk_test_|AKIA[A-Z0-9]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY)"
          if grep -rPn "$PATTERNS" --include="*.js" --include="*.json" --include="*.env" src/ services/ 2>/dev/null | grep -v node_modules; then
            echo "::error::Potential hardcoded secrets found"
            exit 1
          else
            echo "No hardcoded secrets detected"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
