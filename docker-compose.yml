  heady-config:
    driver: local
  heady-plugins:
    driver: local
  heady-exports:
    driver: local
  heady-backups:
    driver: local
  heady-temp:
    driver: local
  heady-models:
    driver: local
  heady-embeddings:
    driver: local
  heady-sessions:
    driver: local
