# HEADY_BRAND:END

services:
  heady-manager:
    build: .
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:pass@cloud-postgres.heady.io:5432/heady_sys
      - REDIS_URL=redis://cloud-redis.heady.io:6379
      - HEADY_API_KEY=${HEADY_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - RENDER_API_KEY=${RENDER_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - USE_HEADY_MANAGER=${USE_HEADY_MANAGER:-true}
      - HEADY_TARGET=CloudOnly
    healthcheck:
      # NOTE: api.headysystems.com is required here вЂ” healthcheck runs inside the container
      test: ["CMD", "wget", "-qO-", "http://api.headysystems.com:3300/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    hostname: heady-manager
    networks:
      heady-main-network:
        aliases:
          - manager.headysystems.com
          - api.headysystems.com
    volumes:
      - heady-data:/app/data
      - heady-logs:/app/logs
      - heady-cache:/app/.cache
      - heady-config:/app/config:ro
      - heady-plugins:/app/plugins:rw
      - heady-exports:/app/exports:rw
      - heady-backups:/app/backups:rw
      - heady-temp:/app/temp:rw
      - heady-models:/app/models:ro
      - heady-embeddings:/app/embeddings:rw
      - heady-sessions:/app/sessions:rw
      - heady-uploads:/app/uploads:rw
      - heady-downloads:/app/downloads:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
        labels: "service=heady-manager"
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=100M,mode=1777

  heady:
    image: python:3.11.14-alpine3.23
    container_name: Heady
    command: python3 -m http.server 8000
    networks:
      - heady-net
    restart: unless-stopped

  domain-router:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/domain-router"
        SERVICE_DIR: "services/domain-router"
    container_name: heady-domain-router
    command: ["tsx", "services/domain-router/src/index.ts"]
    environment:
      PORT: 4301
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4301:4301"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  budget-tracker:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/budget-tracker"
        SERVICE_DIR: "services/budget-tracker"
    container_name: heady-budget-tracker
    command: ["tsx", "services/budget-tracker/src/index.ts"]
    environment:
      PORT: 4303
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4303:4303"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  heady-memory:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/heady-memory"
        SERVICE_DIR: "services/heady-memory"
    container_name: heady-memory
    command: ["tsx", "services/heady-memory/src/index.ts"]
    environment:
      PORT: 4304
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4304:4304"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  heady-health:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/heady-health"
        SERVICE_DIR: "services/heady-health"
    container_name: heady-health
    command: ["tsx", "services/heady-health/src/index.ts"]
    environment:
      PORT: 4305
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4305:4305"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  heady-conductor:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/heady-conductor"
        SERVICE_DIR: "services/heady-conductor"
    container_name: heady-conductor
    command: ["tsx", "services/heady-conductor/src/index.ts"]
    environment:
      PORT: 4306
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4306:4306"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  heady-brains:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/heady-brains"
        SERVICE_DIR: "services/heady-brains"
    container_name: heady-brains
    command: ["tsx", "services/heady-brains/src/index.ts"]
    environment:
      PORT: 4307
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4307:4307"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  heady-soul:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: "@heady-ai/heady-soul"
        SERVICE_DIR: "services/heady-soul"
    container_name: heady-soul
    command: ["tsx", "services/heady-soul/src/index.ts"]
    environment:
      PORT: 4308
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3300
    ports:
      - "4308:4308"
    depends_on:
      heady-manager:
        condition: service_healthy
    networks:
      - heady-net
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Admin / Debug Tools в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: heady-pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@heady.internal
      PGADMIN_DEFAULT_PASSWORD: heady_admin
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - heady-pgadmin:/var/lib/pgadmin
    networks:
      - heady-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: heady-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    networks:
      - heady-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

# в”Ђв”Ђв”Ђ Volumes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  auth-session-server:
    build:
      context: ./services/auth-session-server
      dockerfile: Dockerfile
    environment:
      PORT: 4309
      NODE_ENV: production
      FIREBASE_PROJECT_ID: gen-lang-client-0920560496
    ports:
      - "4309:4309"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4309/health || false"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - heady-net
    restart: unless-stopped

volumes:
  heady-postgres:
    driver: local
  heady-redis:
    driver: local
  heady-data:
    driver: local
  heady-pgadmin:
    driver: local

# в”Ђв”Ђв”Ђ Networks в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

